name: axiom-official/axiom-agent
version: 0.1.0
language: python
description: Top-level Axiom agent orchestrator. Routes AgentRequests to the appropriate specialized sub-flow based on LLM intent classification.
author: Axiom Official
license: MIT
nodes:
  - name: OrchestratorEntry
    input: AgentRequest
    output: AgentRequest
    description: Entry point for the agent. Validates the prompt is non-empty before routing.
  - name: IntentRouter
    input: AgentRequest
    output: AgentRequest
    description: Classifies the user's prompt into one of six intents (build_package, design_flow, debug_package, refactor_package, debug_flow, refactor_flow) and sets AgentRequest.intent for conditional edge routing.
    required_secrets:
      - ANTHROPIC_API_KEY
  - name: StreamStatusToUser
    input: AgentProgress
    output: AgentProgress
    description: Pipeline node. Forwards AgentProgress frames to the user in real time.
    type: pipeline
imports:
  - package: axiom-official/axiom-agent-messages
    version: 0.1.0
    messages:
      - AgentRequest
      - AgentProgress
